version: '3.8'

services:
  # The single routed Expense function (spec §4.2).
  expense:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    environment:
      - FUNCTION_TARGET=Expense
      - PORT=8080
    env_file:
      - .env
    command: go run cmd/main.go
    container_name: expense
